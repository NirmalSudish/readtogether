<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Read Together - Synchronized book reader">
    <title>Read Together ΓÇö Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <link rel="stylesheet" href="/css/reader.css">
</head>

<body>
    <!-- Reader Top Bar -->
    <header class="reader-header" id="reader-header">
        <div class="header-left">
            <button class="icon-btn" id="back-to-room-btn" onclick="goBackToRoom()" title="Back to room">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12" />
                    <polyline points="12 19 5 12 12 5" />
                </svg>
            </button>
            <div class="book-title-bar">
                <span class="book-title" id="reader-book-title">Loading...</span>
            </div>
        </div>

        <div class="header-center">
            <div class="sync-indicator" id="sync-indicator">
                <div class="sync-avatars">
                    <div class="sync-avatar host-sync" id="host-sync-avatar" title="Host">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="7" r="4" />
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        </svg>
                    </div>
                    <div class="sync-avatar guest-sync" id="guest-sync-avatar" title="Guest">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="7" r="4" />
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        </svg>
                    </div>
                </div>
                <span class="sync-text" id="sync-text">Both connected</span>
            </div>
        </div>

        <div class="header-right">
            <button class="icon-btn" id="toggle-theme-btn" onclick="toggleTheme()" title="Toggle theme">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
            <button class="icon-btn" id="font-size-btn" onclick="toggleFontMenu()" title="Font size">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="4 7 4 4 20 4 20 7" />
                    <line x1="9" y1="20" x2="15" y2="20" />
                    <line x1="12" y1="4" x2="12" y2="20" />
                </svg>
            </button>
            <button class="icon-btn" id="notes-toggle-btn" onclick="toggleNotes()" title="Toggle notes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
            </button>
            <button class="icon-btn" id="chat-toggle-btn" onclick="toggleChat()" title="Toggle chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                <span class="chat-badge" id="chat-badge" style="display:none;">0</span>
            </button>
        </div>
    </header>

    <!-- Font Size Dropdown -->
    <div class="font-menu" id="font-menu" style="display: none;">
        <div class="font-menu-header">Text Size</div>
        <div class="font-slider-row">
            <button class="font-adj-btn" onclick="adjustFontSize(-1)">A-</button>
            <input type="range" id="font-slider" min="12" max="28" value="18" oninput="setFontSize(this.value)">
            <button class="font-adj-btn large" onclick="adjustFontSize(1)">A+</button>
        </div>
        <div class="font-menu-header" style="margin-top: 12px;">Font Family</div>
        <div class="font-family-options">
            <button class="font-family-btn active" data-font="'Lora', serif"
                onclick="setFontFamily(this)">Serif</button>
            <button class="font-family-btn" data-font="'Inter', sans-serif" onclick="setFontFamily(this)">Sans</button>
            <button class="font-family-btn" data-font="'Merriweather', serif"
                onclick="setFontFamily(this)">Classic</button>
        </div>
    </div>

    <!-- Main Reader Area -->
    <main class="reader-main" id="reader-main">
        <!-- Loading state -->
        <div class="reader-loading" id="reader-loading">
            <div class="loading-spinner"></div>
            <p>Loading book...</p>
        </div>

        <!-- EPUB viewer -->
        <div id="epub-viewer"></div>

        <!-- Navigation areas (invisible, clickable) -->
        <div class="nav-zone nav-zone-prev" id="nav-prev" onclick="requestPrevPage()" title="Previous page">
            <div class="nav-arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
            </div>
        </div>
        <div class="nav-zone nav-zone-next" id="nav-next" onclick="requestNextPage()" title="Next page">
            <div class="nav-arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6" />
                </svg>
            </div>
        </div>
    </main>

    <!-- Bottom Bar -->
    <footer class="reader-footer" id="reader-footer">
        <div class="footer-left">
            <span class="page-info" id="page-info">Page 0</span>
        </div>

        <div class="footer-center">
            <div class="sync-control">
                <button class="sync-btn prev-btn" id="prev-page-btn" onclick="requestPrevPage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>

                <div class="sync-status" id="sync-status">
                    <div class="sync-progress-ring">
                        <svg viewBox="0 0 48 48">
                            <circle class="ring-bg" cx="24" cy="24" r="20" />
                            <circle class="ring-fill" cx="24" cy="24" r="20" id="sync-ring" />
                        </svg>
                        <span class="sync-count" id="sync-count">0/2</span>
                    </div>
                    <span class="sync-label" id="sync-label">Ready to read</span>
                </div>

                <button class="sync-btn next-btn" id="next-page-btn" onclick="requestNextPage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="footer-right">
            <div class="progress-bar-container">
                <div class="reading-progress-bar">
                    <div class="reading-progress-fill" id="reading-progress-fill"></div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Notes Sidebar -->
    <aside class="notes-sidebar" id="notes-sidebar">
        <div class="notes-header">
            <div class="notes-header-left">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" width="18" height="18">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
                <h3>Notes</h3>
            </div>
            <button class="icon-btn" onclick="toggleNotes()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
        <div class="notes-compose">
            <textarea id="notes-input" placeholder="Write a note about this page..." maxlength="1000"></textarea>
            <div class="notes-compose-footer">
                <span class="notes-char-count" id="notes-char-count">0 / 1000</span>
                <button class="notes-save-btn" id="notes-save-btn" onclick="saveNote()">Save Note</button>
            </div>
        </div>
        <div class="notes-list-header">
            <span>Saved Notes</span>
            <span class="notes-count-badge" id="notes-count-badge">0</span>
        </div>
        <div class="notes-list" id="notes-list">
            <div class="notes-empty" id="notes-empty">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                    <polyline points="10 9 9 9 8 9" />
                </svg>
                <p>No notes yet.</p>
                <p class="notes-empty-sub">Start writing above!</p>
            </div>
        </div>
    </aside>

    <!-- Chat Sidebar -->
    <aside class="chat-sidebar" id="chat-sidebar">
        <div class="chat-header">
            <h3>Chat</h3>
            <button class="icon-btn" onclick="toggleChat()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="chat-empty">
                <p>No messages yet. Say hello! ≡ƒæï</p>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." maxlength="500"
                onkeydown="handleChatKeydown(event)">
            <button class="send-btn" id="send-msg-btn" onclick="sendChatMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>
        </div>
    </aside>

    <!-- Disconnect overlay -->
    <div class="disconnect-overlay" id="disconnect-overlay" style="display: none;">
        <div class="disconnect-card">
            <div class="disconnect-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="1" y1="1" x2="23" y2="23" />
                    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
                    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
                    <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
                    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
                    <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
                    <line x1="12" y1="20" x2="12.01" y2="20" />
                </svg>
            </div>
            <h3 id="disconnect-title">Partner Disconnected</h3>
            <p id="disconnect-message">Waiting for reconnection...</p>
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/reader.js"></script>
</body>

</html>
